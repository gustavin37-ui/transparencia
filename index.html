<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Estructura Organizativa CM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a2332; font-size: 13px; }

  #header { background: linear-gradient(135deg, #1F3864, #2E75B6); color: white; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  #header h1 { font-size: 14px; font-weight: 700; letter-spacing: .5px; margin-bottom: 2px; }
  #header .subtitle { font-size: 10px; opacity: .75; text-transform: uppercase; letter-spacing: 1px; }

  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .btn { border: none; cursor: pointer; border-radius: 5px; font-size: 11px; font-weight: 600; padding: 6px 12px; transition: all .2s; display: inline-flex; align-items: center; gap: 5px; }
  .btn-export { background: #f39c12; color: white; }
  .btn-export:hover { background: #d68910; }
  .btn-collapse { background: rgba(255,255,255,.2); color: white; }
  .btn-collapse:hover { background: rgba(255,255,255,.3); }

  #status-bar { background: #2c3e50; color: #ecf0f1; font-size: 11px; padding: 6px 18px; display: flex; justify-content: space-between; align-items: center; }
  #stats { display: flex; gap: 14px; }
  #stats span { color: #ecf0f1; }
  #stats b { color: #2ecc71; }
  
  #filters { padding: 10px 18px; background: white; border-bottom: 1px solid #dde3ec; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .filter-chip { background: #eaf1fb; border: 1px solid #2E75B6; border-radius: 12px; padding: 4px 12px; font-size: 11px; cursor: pointer; color: #2E75B6; font-weight: 600; transition: all 0.2s; }
  .filter-chip:hover { background: #d0e1f9; }
  .filter-chip.active { background: #2E75B6; color: white; }
  
  #search-box { border: 1px solid #c5d5e8; border-radius: 5px; padding: 5px 12px; font-size: 12px; width: 250px; outline: none; }
  #search-box:focus { border-color: #2E75B6; box-shadow: 0 0 0 2px rgba(46, 117, 182, 0.2); }

  #visible-counter { margin-left: auto; font-size: 13px; color: #1F3864; font-weight: 700; background: #eaf1fb; padding: 5px 12px; border-radius: 5px; border: 1px dashed #2E75B6; }

  #table-wrap { overflow: auto; max-height: calc(100vh - 145px); }

  table { width: 100%; border-collapse: collapse; }
  thead th { background: #2E75B6; color: white; padding: 10px; font-size: 11px; font-weight: 700; position: sticky; top: 0; z-index: 10; text-align: left; white-space: nowrap; }
  thead th:first-child { width: 24px; }
  thead th:nth-child(2) { width: 180px; }
  thead th:nth-child(3) { min-width: 280px; }
  thead th:nth-child(4) { min-width: 200px; }
  thead th:nth-child(5) { width: 60px; text-align: center; }

  tr.row-data:hover td { filter: brightness(.96); background-color: #fafbfc; }
  td { padding: 6px 10px; border-bottom: 1px solid #e8edf3; vertical-align: middle; white-space: nowrap; }

  .toggle-btn { background: none; border: 1px solid #aab; border-radius: 3px; width: 16px; height: 16px; cursor: pointer; font-size: 10px; color: #555; line-height: 14px; text-align: center; flex-shrink: 0; }
  .toggle-btn:hover { background: #dde3ec; }

  .name-cell { display: flex; align-items: center; gap: 0; }
  .name-link { color: inherit; text-decoration: none; font-weight: inherit; }
  .name-link:hover { text-decoration: underline; color: #2E75B6; }
  
  .url-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-left: 6px; flex-shrink: 0; }
  .url-status.verified { background: #27ae60; box-shadow: 0 0 0 1px #fff; }
  .url-status.failed   { background: #c0392b; box-shadow: 0 0 0 1px #fff; }

  .tipo-badge { font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: 600; white-space: nowrap; letter-spacing: 0.5px; }

  .titular-cell { color: #2c3e50; }
  .titular-cell.from-crawl { color: #1a7a3c; font-weight: 500; }
  .titular-cell.from-crawl::before { content: "✓ "; color: #27ae60; font-weight: bold; }
  .titular-cell.loaded { color: #1a7a3c; font-weight: 500; }

  .l0 td { background: #1F3864 !important; color: white !important; font-weight: 700; font-size: 13px; }
  .l0 td a { color: #a8d1ff !important; }
  .l1 td { background: #2E75B6 !important; color: white !important; font-weight: 600; font-size: 12px; }
  .l1 td a { color: #cce4ff !important; }
  .l2 td { background: #4472C4 !important; color: white !important; font-size: 12px; }
  .l2 td a { color: #daeeff !important; }
  .l3 td { background: #8FAADC; color: #1a2332; }
  .l4 td { background: #BDD7EE; color: #1a2332; }
  .l5 td { background: #DEEAF1; color: #2c3e50; }
</style>
</head>
<body onload="cargarDatosAutomaticos()">

<div id="header">
  <div>
    <div class="subtitle">Herramienta de Consulta Profesional</div>
    <h1>🏛️ Estructura Organizativa CM</h1>
  </div>
  <div class="toolbar">
    <button class="btn btn-collapse" onclick="collapseAll()">⊟ Colapsar todo</button>
    <button class="btn btn-collapse" onclick="expandAll()">⊞ Expandir todo</button>
    <button class="btn btn-export" onclick="exportExcel()">📥 Exportar Excel</button>
  </div>
</div>

<div id="status-bar">
  <span id="status-text">⏳ Conectando a la base de datos...</span>
  <span id="stats">
    <span>Total: <b id="stat-total">0</b></span>
    <span>URLs Enlazadas: <b id="stat-urls">0</b></span>
    <span>Titulares: <b id="stat-titulares">0</b></span>
  </span>
</div>

<div id="filters">
  <input id="search-box" type="text" placeholder="🔍 Buscar unidad o titular..." oninput="filterRows()">
  <div id="type-filters">
    <span class="filter-chip active" onclick="setTypeFilter(this,'all')">Todos</span>
    <span class="filter-chip" onclick="setTypeFilter(this,'Consejería')">Consejería</span>
    <span class="filter-chip" onclick="setTypeFilter(this,'Viceconsejería')">Viceconsejería</span>
    <span class="filter-chip" onclick="setTypeFilter(this,'Dirección General')">Dirección General</span>
    <span class="filter-chip" onclick="setTypeFilter(this,'Subdirección')">Subdirección</span>
    <span class="filter-chip" onclick="setTypeFilter(this,'División')">División</span>
    <span class="filter-chip" onclick="setTypeFilter(this,'Área')">Área</span>
  </div>
  <span id="visible-counter">Mostrando: <b>0</b> resultados</span>
</div>

<div id="table-wrap">
<table id="org-table">
  <thead>
    <tr>
      <th></th>
      <th>Tipo</th>
      <th>Unidad Organizativa</th>
      <th>Titular / Persona</th>
      <th>Nv.</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const BASE = "https://www.comunidad.madrid/transparencia/unidad-organizativa-responsable/";
let DATA = []; 
const state = { expanded: {}, typeFilter: 'all', searchQuery: '' };
const rows = [];

async function cargarDatosAutomaticos() {
  const statusEl = document.getElementById('status-text');
  try {
    const response = await fetch('data.json');
    if (!response.ok) throw new Error('Archivo no encontrado');
    
    DATA = await response.json();
    init();
    
    statusEl.innerHTML = `✅ Base de datos conectada. Mapeo generado por Araña Web.`;
  } catch (err) {
    statusEl.innerHTML = `❌ <b>Error:</b> No se encontró el archivo 'data.json'. Ejecuta tu script de Python para crearlo.`;
  }
}

function normalizarTexto(texto) {
    if (!texto) return "";
    return texto.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();                          
}

function init() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.length = 0;

  // Filtro
  DATA = DATA.filter(item => {
      const nombreUnidad = normalizarTexto(item[2] || "");
      return !nombreUnidad.includes("otras entidades del sector");
  });

  DATA.forEach((item, i) => {
    const tr = construirFila(item, i);
    tbody.appendChild(tr);
    rows.push({tr, level: item[0], i, name: item[2], titular: item[3]});
  });

  applyVisibility();
  document.getElementById('stat-total').textContent = DATA.length;
  document.getElementById('stat-urls').textContent = DATA.filter(d => d[5] === 'verified' || d[5] === '✓ Verificada').length;
  document.getElementById('stat-titulares').textContent = DATA.filter(d => d[3] && d[3] !== '').length;
}

function construirFila(item, i) {
  const [level, tipo, name, titular, slug, urlStatus, titularSource] = item;
  const url = slug ? (BASE + slug) : '#';
  const lvl = level > 5 ? 5 : level;
  const COLORS = {0:'#1F3864',1:'#2E75B6',2:'#4472C4',3:'#8FAADC',4:'#BDD7EE',5:'#DEEAF1'};

  const tr = document.createElement('tr');
  tr.className = `row-data l${lvl}`;
  tr.id = 'r' + i;

  const nextItem = DATA[i+1];
  const hasKids = nextItem && nextItem[0] > level;
  if (state.expanded[i] === undefined) state.expanded[i] = level < 2;

  const indent = level * 16;

  let statusCls = 'failed', statusTitle = '✗ No enlazado en el organigrama oficial';
  if (urlStatus === 'verified' || urlStatus === '✓ Verificada') { statusCls = 'verified'; statusTitle = '✓ URL confirmada por la Araña Web'; }

  const titularCls = titularSource === 'crawl' ? 'from-crawl' : (titular && normalizarTexto(titular) !== 'vacante' ? 'loaded' : '');
  const titularTxt = titular || '<span style="opacity:.4;font-style:italic;font-size:10px">—</span>';

  tr.innerHTML = `
    <td><button class="toggle-btn" id="tb${i}" onclick="toggleRow(${i})">${hasKids ? (state.expanded[i]?'−':'+') : ' '}</button></td>
    <td><span class="tipo-badge" style="background:${COLORS[lvl]}22;color:${COLORS[lvl]};border:1px solid ${COLORS[lvl]}44">${tipo}</span></td>
    <td><div class="name-cell" style="padding-left:${indent}px">
      <a class="name-link" href="${url}" target="_blank" title="${url}">${escapeHtml(name)}</a>
      <span class="url-status ${statusCls}" title="${statusTitle}"></span>
    </div></td>
    <td class="titular-cell ${titularCls}">${typeof titularTxt === 'string' && titularTxt.startsWith('<') ? titularTxt : escapeHtml(titularTxt)}</td>
    <td style="text-align:center;opacity:.5;font-size:10px">${level}</td>
  `;
  return tr;
}

function escapeHtml(s) {
  if (s == null) return '';
  return s.toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function applyVisibility() {
  const tf = state.typeFilter; 
  const q = normalizarTexto(state.searchQuery);
  let countVisible = 0;
  
  for (let i = 0; i < rows.length; i++) {
    const {tr, level, name, titular} = rows[i];
    let visible = true;
    
    if (tf === 'all' && !q) {
        let parentLevel = level - 1;
        for (let j = i - 1; j >= 0 && parentLevel >= 0; j--) {
          if (rows[j].level === parentLevel) {
            if (!state.expanded[j]) { visible = false; break; }
            parentLevel--;
          }
        }
    } else {
        if (tf !== 'all') {
            const nombreNormalizado = normalizarTexto(name);       
            const botonNormalizado = normalizarTexto(tf);          
            if (!nombreNormalizado.startsWith(botonNormalizado)) visible = false;
        }
    }
    
    if (visible && q) {
        const textToSearch = normalizarTexto(name) + " " + normalizarTexto(titular);
        if (!textToSearch.includes(q)) visible = false;
    }
    
    tr.style.display = visible ? '' : 'none';
    if (visible) countVisible++;
  }
  
  document.getElementById('visible-counter').innerHTML = `Mostrando: <b>${countVisible}</b> resultados`;
}

function toggleRow(i) { state.expanded[i] = !state.expanded[i]; document.getElementById('tb' + i).textContent = state.expanded[i] ? '−' : '+'; applyVisibility(); }
function setTypeFilter(el, type) { state.typeFilter = type; document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); applyVisibility(); }
function filterRows() { state.searchQuery = document.getElementById('search-box').value; applyVisibility(); }
function collapseAll() { rows.forEach((_,i) => { state.expanded[i] = false; const b=document.getElementById('tb'+i); if(b)b.textContent='+'; }); applyVisibility(); }
function expandAll() { rows.forEach((_,i) => { state.expanded[i] = true; const b=document.getElementById('tb'+i); if(b)b.textContent='−'; }); applyVisibility(); }

function exportExcel() {
  if (!DATA.length) { alert('Los datos aún no se han cargado.'); return; }
  const wb = XLSX.utils.book_new();
  const wsData = [['Nivel', 'Tipo', 'Unidad Organizativa', 'Titular / Persona', 'URL Oficial', 'Estado URL']];
  
  DATA.forEach(([level, tipo, name, titular, slug, urlStatus]) => {
    let estadoTexto = urlStatus === 'verified' || urlStatus === '✓ Verificada' ? '✓ Verificada' : '✗ No encontrada';
    wsData.push([level, tipo, '  '.repeat(level) + name, titular || '', slug ? (BASE + slug) : '', estadoTexto]);
  });
  
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{wch:6},{wch:22},{wch:65},{wch:40},{wch:85},{wch:15}];
  XLSX.utils.book_append_sheet(wb, ws, 'Organización CM');
  XLSX.writeFile(wb, 'Organigrama_CM_Actualizado.xlsx');
}
</script>
</body>
</html>
